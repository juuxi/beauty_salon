<!-- если надо отдельно ячейка формы -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Форма записи - Flora{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <button class="close-icon" onclick="history.back()">&times;</button>
        
        <h2 class="form-title">Создание услуги</h2>

        <form action="#" method="POST" class="styled-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Название <span style="color:red">*</span></label>
                    <input type="text" id="name" placeholder="Например: Стрижка каре" required>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category">
                        <option>Макияж</option>
                        <option>Брови</option>
                        <option>Ресницы</option>
                        <option>Стрижки</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" rows="3" placeholder="Подробное описание процедуры..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="duration">Длительность (мин)</label>
                    <input type="number" id="duration" placeholder="60">
                </div>
                <div class="form-group">
                    <label for="price">Стоимость (₽)</label>
                    <input type="number" id="price" placeholder="1500">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-cancel" onclick="history.back()">Отмена</button>
                <button type="submit" class="btn btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
